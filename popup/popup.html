<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="pop.css" />
    <meta charset="utf-8" />
  </head>
  <body>
    <h2>YouTube Viewport Fullscreen</h2>

    <div class="row">
      <label>Keyboard shortcut</label>
      <input
        class="shortcut-input"
        id="shortcut-input"
        readonly
        placeholder="Press a key..."
      />
      <p class="hint">Click the box, then press any key to assign it.</p>
      <p class="warning" id="shortcut-warning"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
