<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="pop.css" />
</head>

<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <img src="icon48.png" alt="Brand Logo" class="brand-logo" />
        <span class="brand-name">Youtube+</span>
      </div>
      <span class="plan-badge">Free</span>
    </header>

    <section class="shortcut-card">
      <h1 class="title_name">Windows Fullscreen</h1>
      <div class="shortcut-row">
        <div class="shortcut-copy">
          <label for="shortcut-input">Keyboard shortcut</label>
          <p class="hint">Click the box and press key to save.</p>
        </div>

        <input class="shortcut-input" id="shortcut-input" readonly placeholder="⌘" />
      </div>

      <p class="warning" id="shortcut-warning"></p>
    </section>
  </main>
  <script src="popup.js"></script>
</body>

</html>
